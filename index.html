  <script type="text/babel">
    const { useEffect, useRef } = React;

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);
      const timeoutRef = useRef(null);
      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return undefined;

        const fadeTo = (target, duration) => {
          cancelAnimationFrame(rafRef.current);
          const raw = parseFloat(video.style.opacity || "0");
          const startOpacity = Number.isFinite(raw) ? raw : 0;
          const start = performance.now();

          const tick = (now) => {
            const progress = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - progress, 3);
            const next = startOpacity + (target - startOpacity) * eased;
            video.style.opacity = String(next);
            if (progress < 1) {
              rafRef.current = requestAnimationFrame(tick);
            }
          };

          rafRef.current = requestAnimationFrame(tick);
        };

        const handleLoadedData = () => {
          video.style.opacity = "0";
          video.play().catch(() => { });
          fadeTo(1, FADE_MS);
        };

        const handleTimeUpdate = () => {
          if (!video.duration || fadingOutRef.current) return;
          const remaining = video.duration - video.currentTime;
          if (remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const handleEnded = () => {
          video.style.opacity = "0";
          timeoutRef.current = setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => { });
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener("loadeddata", handleLoadedData);
        video.addEventListener("timeupdate", handleTimeUpdate);
        video.addEventListener("ended", handleEnded);

        return () => {
          cancelAnimationFrame(rafRef.current);
          clearTimeout(timeoutRef.current);
          video.removeEventListener("loadeddata", handleLoadedData);
          video.removeEventListener("timeupdate", handleTimeUpdate);
          video.removeEventListener("ended", handleEnded);
        };
      }, [src]);

      return (
        <video ref={videoRef} src={src} className={className} style={{ ...style, opacity: 0 }} autoPlay muted
          playsInline preload="auto" />
      );
    }

    window.FadingVideo = FadingVideo;
  </script>

  <script type="text/babel">
    const { motion } = window.Motion;
    const { useEffect, useRef, useState } = React;

    function BlurText({ text, className }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const node = ref.current;
        if (!node) return undefined;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setVisible(true);
            observer.disconnect();
          }
        }, { threshold: 0.1 });
        observer.observe(node);
        return () => observer.disconnect();
      }, []);

      return (
        <p ref={ref} className={className}>
          {text.split(" ").map((word, i) => (
            <motion.span
              key={`${word}-${i}`}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={visible ? {
                filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0]
              } : {}}
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000
              }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    window.BlurText = BlurText;
  </script>
